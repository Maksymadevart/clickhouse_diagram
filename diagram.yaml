# ============================================================
# diagram.yaml — ClickHouse data lineage source of truth
# ============================================================
# This file is the SOURCE OF TRUTH for the lineage diagram.
# A daily Jenkins job (clickhouse_diagram.py) appends newly-created
# tables and flags dropped ones; humans curate everything else.
#
# HOW TO EDIT (humans):
#   1. Move tables out of the 'review' layer into bronze/silver/gold
#   2. Set the correct icon and fill in docs_url / etl_url
#   3. Delete rows of dropped tables once they are truly gone
#   4. Add/edit relationships in the `edges` section
#   (HTML is regenerated automatically by the daily job; to rebuild
#    locally run: python generate_diagram.py)
#
# FIELD REFERENCE:
#   id          — unique identifier (no spaces), used in edges
#   schema      — ClickHouse schema name
#   name        — ClickHouse table name
#   layer       — bronze | silver | gold | review
#   icon        — none | clock | flash | created | dropped
#                   none    = no icon (default if omitted)
#                   clock   = scheduled ETL
#                   flash   = realtime loaded data
#                   created = newly discovered, awaiting triage (auto-set)
#                   dropped = dropped in ClickHouse, kept for review (auto-set)
#   is_mview    — true | false  (materialized view — shown as an MV badge)
#   docs_url    — Confluence page URL, or "insert_link_here" if not ready yet
#   etl_url     — GitLab script URL,   or "insert_link_here" if not ready yet
# ============================================================

